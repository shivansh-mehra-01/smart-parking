[build]
  base = "frontend"
  command = "npm install --prefer-offline --no-audit && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  # Override VITE_API_URL in the Netlify dashboard → Site settings → Environment variables
  # Set it to your Render backend URL: https://your-backend.onrender.com/api
  VITE_API_URL = "https://your-backend.onrender.com/api"

# SPA fallback: send all routes to index.html so React Router works on page refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
